<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Académico - Luis Eduardo | UFPS Ocaña</title>
    <style>
        :root {
            --primary-red: #aa1916;
            --neutral-bg: #e9ecef; /* Fondo neutro profesional */
            --dark-slate: #343a40;
            --white: #ffffff;
            --border: #dee2e6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--neutral-bg);
            margin: 0;
            line-height: 1.6;
            color: var(--dark-slate);
        }

        header {
            background-color: var(--dark-slate);
            color: var(--white);
            padding: 50px 20px;
            text-align: center;
            border-bottom: 5px solid var(--primary-red);
        }

        header h1 { font-size: 2.5rem; margin: 0; letter-spacing: 2px; }

        .container {
            max-width: 850px;
            margin: 30px auto;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* ESTA ES LA PARTE IMPORTANTE PARA LA IMAGEN */
        .university-image {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            display: block;
        }

        .content { padding: 40px; }

        h2 { 
            color: var(--dark-slate); 
            border-bottom: 2px solid var(--primary-red); 
            padding-bottom: 10px;
            margin-top: 0;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .info-table th, .info-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .info-table th { background-color: #f8f9fa; width: 35%; color: #6c757d; }

        footer {
            background-color: var(--dark-slate);
            color: var(--white);
            text-align: center;
            padding: 30px 20px;
        }
        .firma { font-weight: bold; color: #adb5bd; }
    </style>
</head>
<body>

    <header>
        <h1>LUIS EDUARDO</h1>
        <p>Ingeniería de Sistemas • UFPS Ocaña</p>
    </header>

    <div class="container">
        <img src="universidad.jpg" alt="UFPS Ocaña" class="university-image">

        <div class="content">
            <section>
                <h2>Información Personal</h2>
                <table class="info-table">
                    <tbody>
                        <tr>
                            <th>Nombre</th>
                            <td>Luis Eduardo</td>
                        </tr>
                        <tr>
                            <th>Estatura</th>
                            <td>1.75 m</td>
                        </tr>
                        <tr>
                            <th>Hobby</th>
                            <td>Ajedrez y Optimización de Hardware</td>
                        </tr>
                        <tr>
                            <th>Institución</th>
                            <td>Universidad Francisco de Paula Santander</td>
                        </tr>
                        <tr>
                            <th>Ubicación</th>
                            <td>Ocaña, Norte de Santander</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </div>

    <footer>
        <p class="firma">Página creada por Luis Eduardo - 2026</p>
    </footer>

</body>
</html>
