<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Profesional - Luis Eduardo</title>
    <style>
        :root {
            --ufps-red: #aa1916;
            --dark: #2d2d2d;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            /* Aquí se añade la foto que enviaste como fondo del encabezado */
            background: linear-gradient(rgba(170, 25, 22, 0.7), rgba(0, 0, 0, 0.6)), 
                        url('https://ww2.ufps.edu.co/public/archivos/elementos_visuales/9079f2913e2d63301a0a5789a690e87b.jpg');
            background-size: cover;
            background-position: center;
            color: var(--white);
            padding: 100px 20px;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: -50px auto 50px;
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 { color: var(--ufps-red); border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .perfil-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .perfil-table th, .perfil-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .perfil-table th { background-color: #f9f9f9; width: 35%; }

        footer {
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>LUIS EDUARDO</h1>
        <p>Ingeniería de Sistemas - UFPS Ocaña</p>
    </header>

    <div class="container">
        <section>
            <h2>Información Personal</h2>
            <table class="perfil-table">
                <tr>
                    <th>Nombre:</th>
                    <td>Luis Eduardo</td>
                </tr>
                <tr>
                    <th>Estatura:</th>
                    <td>1.75 m</td>
                </tr>
                <tr>
                    <th>Pasatiempo:</th>
                    <td>Ajedrez y Optimización de Hardware</td>
                </tr>
            </table>
        </section>
    </div>

    <footer>
        <p>Pagina creada por Luis Eduardo</p>
    </footer>

</body>
</html>
